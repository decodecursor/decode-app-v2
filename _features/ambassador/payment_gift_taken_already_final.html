<!DOCTYPE html>
<html><head><title>Wish already gifted</title>
<style>
body{margin:0;padding:24px 0;background:#111;display:flex;justify-content:center;font-family:system-ui,-apple-system,sans-serif}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}

#pgPage{width:375px;background:#000;border-radius:24px;overflow:hidden;color:#fff;border:2px solid #222}

.btn{
  background:#e91e8c;border-radius:12px;padding:16px;font-size:15px;font-weight:600;
  cursor:pointer;color:#fff;text-align:center;text-decoration:none;display:block;
  transition:filter 0.15s,transform 0.05s;
}
.btn:hover{filter:brightness(1.08)}
.btn:active{transform:scale(0.99)}
</style></head>
<body>

<div id="pgPage">

<!-- Body -->
<div style="padding:160px 20px 24px;text-align:center">
<div style="font-size:22px;font-weight:700;margin-bottom:10px;letter-spacing:-0.2px">Someone was faster!</div>
<div style="font-size:13px;color:#888;line-height:1.6;margin-bottom:40px">This beauty wish has already been<br>gifted by someone else.</div>

<a id="pg_backBtn" href="/" class="btn">Go to <span id="pg_firstName">page</span></a>
</div>

</div>

<script>
(function(){
  function $(id){return document.getElementById(id);}

  /* =====================================================================
     ENTRY POINTS
     ---------------------------------------------------------------------
     This page is reached ONLY via server redirect from the wish checkout
     when the wish was already granted (race condition):

       Gifter on checkout → taps Pay
       → POST /api/checkout/wish
       → server atomically checks wishes.is_granted (SELECT FOR UPDATE)
       → if true, returns 409 Conflict with body:
            { "error": "wish_already_granted",
              "ambassador": { "slug": "sarajohnson", "first_name": "Sara" } }
       → frontend redirects here: /wish/already-gifted?slug=sarajohnson&first=Sara

     DATA VALIDATION
     ---------------------------------------------------------------------
     Params are read from URL and validated against strict regex:
       slug:  /^[a-z0-9_.-]{1,30}$/i
              missing OR invalid → redirect to / (homepage)
       first: /^[\p{L}\s]{1,50}$/u  (any-language letters + spaces)
              missing OR invalid → fallback to "their" ("Back to their page")

     HISTORY HANDLING
     ---------------------------------------------------------------------
     On load, we replace the current history entry so the back button
     skips this redirect hop. Prevents infinite loop where browser back
     → checkout page → 410 Gone → redirects here again.
     ===================================================================== */

  var SLUG_RE  = /^[a-z0-9_.-]{1,30}$/i;
  var FIRST_RE = /^[\p{L}\s]{1,50}$/u;

  function init(){
    var slug = null;
    var firstName = null;
    try {
      var params = new URLSearchParams(window.location.search);
      slug = params.get('slug');
      firstName = params.get('first');
    } catch(e) {}

    // MOCKUP-ONLY: when opened via file:// or without params, render demo data
    // so the page can be previewed. Remove this fallback in production.
    var isMockup = window.location.protocol === 'file:' || (!slug && !firstName);
    if (isMockup && !slug) {
      slug = 'sarajohnson';
      firstName = firstName || 'Sara';
    }

    // Validate slug — bad/missing → redirect home (production behavior)
    if (!slug || !SLUG_RE.test(slug)) {
      window.location.replace('/');
      return;
    }

    // Validate first name — bad/missing → generic fallback "their"
    if (!firstName || !FIRST_RE.test(firstName)) {
      firstName = 'their';
    }

    // textContent is XSS-safe (never interprets HTML). Button href uses slug (regex-validated above).
    $('pg_firstName').textContent = firstName + (firstName === 'their' ? ' page' : '\u2019s page');
    $('pg_backBtn').href = '/' + slug;

    // Replace current history entry so browser back doesn't loop back to checkout
    try {
      if (history && history.replaceState) {
        history.replaceState(null, '', window.location.href);
      }
    } catch(e) {}
  }

  init();
})();
</script>

</body></html>
