   with { event_type, slug, target_id? }, keepalive:true, fire-and-forget.

   event_type values used on this page (model_analytics_events CHECK enum):
     public_page_view              server-side on render (not shown here)
     public_page_share_click       share button (top-right)
     ambassador_instagram_click    ambassador IG button (top-left)
     listing_instagram_click       squad avatar tap → professional IG
     listing_media_click           squad media orb → lightbox
     listing_modal_open            squad middle column → Pro Info modal

     listing_whatsapp_modal_click  modal Send WhatsApp → wa.me
     wish_giftit_click             wishlist "Gift it" pill → checkout
     wall_of_love_instagram_click  wall of love gifter name → IG

   VIEW TRACKING (server-side on render — Pattern 2/3 doctrine)
     PublicPageClient fires public_page_view on mount; server does bot
     filter, IP+event rate-limit, ambassador self-view skip, session
     cookie (wld_visitor, 30-day), insert into model_analytics_events.
============================================================ */

/* ============================================================
   TRUST ROW — three demand states (V1 locked, Q12):
     messaged_30d >= 10   →  "💬 {N} in 30d"  + pulse on WA badge
     1..9                  →  "💬 Last msg {X}d ago"  (no pulse)
     0                     →  "💬 New"  (always-on for V1 launch)
   Rating segment hides entirely when rating is null/<=0.
   Both glyphs (★ and chat) render filled white, same weight.
============================================================ */
function chatIcon(){
  return '<svg width="12" height="12" viewBox="0 0 24 24" fill="#fff" aria-hidden="true" style="vertical-align:-1px;margin-right:3px"><path d="M20 2H4c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h4l4 4 4-4h4c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2z"/></svg>';
}
function renderTrustRow(s){
  var parts = [];
  if (s.rating && s.rating > 0 && s.review_count > 0) {
    parts.push('<span style="color:#fff">★</span> ' + s.rating.toFixed(1) + ' (' + s.review_count + ')');
  }
  var demand = '';
  if (s.messaged_30d >= 10) {
    demand = chatIcon() + s.messaged_30d + ' in 30d';
  } else if (s.messaged_30d >= 1) {
    demand = chatIcon() + 'Last msg ' + (s.last_msg_days || 1) + 'd ago';
  } else {
    demand = chatIcon() + 'New';
  }
  parts.push(demand);
  return parts.join('<span style="color:#555;margin:0 6px">·</span>');
}

/* ============================================================

          '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#e91e8c" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><polygon points="7 4 20 12 7 20 7 4"/></svg>' +
        '</div>' +

}

/* ============================================================
   PRO INFO MODAL
============================================================ */
var modalOpenFiredFor = null;

function starString(rating){
  var full = Math.round(rating);
  var s = '';
  for (var i=0;i<5;i++){ s += (i<full ? '★' : '☆'); }
  return s;
}

function openProModal(id){
  var s = squadById[id];
  if (!s) return;

  document.getElementById('pmCategory').textContent = s.category;
  document.getElementById('pmName').textContent = s.name;
  document.getElementById('pmCity').textContent = s.city;

  /* rating column + 5-bar distribution — hidden if no Places rating */
  var grid = document.getElementById('pmRatingGrid');
  if (s.rating && s.rating > 0 && s.review_count > 0){
    grid.style.display = 'grid';
    document.getElementById('pmRatingNum').textContent = s.rating.toFixed(1);
    document.getElementById('pmStars').textContent = starString(s.rating);
    document.getElementById('pmReviewCount').innerHTML = s.review_count + ' Google<br>reviews';
    var max = Math.max.apply(null, s.distribution) || 1;
    document.getElementById('pmDist').innerHTML = s.distribution.map(function(c, idx){
      var starNum = 5 - idx;
      var pct = Math.round((c / max) * 100);
      return (
        '<div style="font-size:10px;color:#aaa;text-align:right">' + starNum + '</div>' +
        '<div style="height:4px;background:rgba(255,255,255,0.08);border-radius:2px;overflow:hidden">' +
          '<div class="pm-d-fill" style="height:100%;background:#e91e8c;border-radius:2px;width:0%" data-pct="' + pct + '"></div>' +
        '</div>' +
        '<div style="font-size:10px;color:#888;font-variant-numeric:tabular-nums;min-width:24px;text-align:right">' + c + '</div>'
      );
    }).join('');
  } else {
    grid.style.display = 'none';
  }

  /* quick action row — only buttons whose data exists; native <a>, no target */
  var q = [];
  if (s.website) q.push(quickBtn(s.website, 'Website', '<circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>'));
  if (s.maps_url) q.push(quickBtn(s.maps_url, 'Google Maps', '<path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/>'));
  if (s.phone) q.push(quickBtn('tel:' + s.phone, 'Phone', '<path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07 19.5 19.5 0 0 1-6-6 19.79 19.79 0 0 1-3.07-8.67A2 2 0 0 1 4.11 2h3a2 2 0 0 1 2 1.72c.13.94.36 1.86.7 2.73a2 2 0 0 1-.45 2.11L8.09 9.91a16 16 0 0 0 6 6l1.35-1.35a2 2 0 0 1 2.11-.45c.87.34 1.79.57 2.73.7A2 2 0 0 1 22 16.92z"/>'));
  var qr = document.getElementById('pmQuickRow');
  if (q.length){
    qr.style.display = 'grid';
    qr.style.gridTemplateColumns = 'repeat(' + q.length + ',1fr)';
    qr.innerHTML = q.join('');
  } else {
    qr.style.display = 'none';
  }

  /* AI summary — hidden if none */
  var sw = document.getElementById('pmSummaryWrap');
  if (s.summary && s.summary.trim()){
    sw.style.display = 'block';
    document.getElementById('pmSummary').textContent = '“' + s.summary.trim() + '”';
  } else {
    sw.style.display = 'none';
  }

  /* demand line — hidden if 0 messaged */
  var dl = document.getElementById('pmDemand');
  if (s.messaged_30d > 0){
    dl.style.display = 'block';
    dl.textContent = s.messaged_30d + ' people messaged in the last 30 days';
  } else {
    dl.style.display = 'none';
  }

  /* Send WhatsApp — hidden if no number */
  var ww = document.getElementById('pmWaWrap');
  var wb = document.getElementById('pmWaBtn');
  if (s.whatsapp){
    ww.style.display = 'block';
    wb.setAttribute('href', 'https://wa.me/' + s.whatsapp);
    wb.dataset.id = s.id;
  } else {
    ww.style.display = 'none';
  }

  /* open: backdrop + slide-up. listing_modal_open once per open. */
  var bd = document.getElementById('proModalBackdrop');
  bd.style.display = 'flex';
  var sheet = document.getElementById('proModalSheet');
  /* force reflow then animate in */
  void sheet.offsetWidth;
  sheet.style.transform = 'translateY(0)';
  setTimeout(function(){
    document.querySelectorAll('#pmDist .pm-d-fill').forEach(function(el){
      el.style.transition = 'width 1500ms cubic-bezier(0.215,0.61,0.355,1)';
      el.style.width = el.getAttribute('data-pct') + '%';
    });
  }, 60);

  if (modalOpenFiredFor !== id){
    modalOpenFiredFor = id;
    trackClick('listing_modal_open', { target_id:id });
  }
}

function quickBtn(href, label, iconPaths){
  var isTel = href.indexOf('tel:') === 0;
  var attrs = isTel ? '' : ' target="_blank" rel="noopener"';
  /* NOTE: production renders these with NO target attribute at all
     (same-tab) so iOS hands tel:/maps universal links to the app.
     The mockup keeps target=_blank only so the demo opens visibly. */
  return (
    '<a href="' + href + '"' + attrs + ' style="background:#0a0a0a;border:0.5px solid #2a2a2a;border-radius:12px;padding:8px 0;display:flex;flex-direction:column;align-items:center;gap:4px;text-decoration:none">' +
      '<svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#e91e8c" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">' + iconPaths + '</svg>' +
      '<span style="font-size:11px;color:#ddd">' + label + '</span>' +
    '</a>'
  );
}

function onModalWhatsapp(e){
  var id = document.getElementById('pmWaBtn').dataset.id;
  trackClick('listing_whatsapp_modal_click', { target_id:id });
  /* MOCKUP: prevent the # navigation; production is a real wa.me
     <a href> with NO target (same-tab) and no preventDefault. */
  e.preventDefault();
  console.log('[wa] open https://wa.me/ for', id);
}

function closeProModal(){
  var sheet = document.getElementById('proModalSheet');
  sheet.style.transform = 'translateY(100%)';
  setTimeout(function(){
    document.getElementById('proModalBackdrop').style.display = 'none';
    modalOpenFiredFor = null;
    document.querySelectorAll('#pmDist .pm-d-fill').forEach(function(el){
      el.style.transition = 'none';
      el.style.width = '0%';
    });
  }, 200);
}

/* backdrop tap closes (only when the backdrop itself is the target) */
function onModalBackdrop(e){
  if (e.target === e.currentTarget) closeProModal();
}

/* Escape closes */
document.addEventListener('keydown', function(e){
  if (e.key === 'Escape' &&
      document.getElementById('proModalBackdrop').style.display === 'flex'){
    closeProModal();
  }
});

/* ============================================================
   SHARE button (top-right) — native share → clipboard fallback
============================================================ */
function sharePage(){
  trackClick('public_page_share_click', {});
  var url = 'https://welovedecode.com/sarajohnson';
  var title = 'Sara Johnson — WeLoveDecode';
  function flashConfirm(text){
    var el = document.getElementById('shareConfirm');
    el.textContent = text;
    el.style.opacity = '1';
    clearTimeout(el._timer);
    el._timer = setTimeout(function(){ el.style.opacity = '0'; }, 1800);
  }
  if (navigator.share){
    navigator.share({ title:title, url:url })
      .then(function(){ flashConfirm('Shared!'); }).catch(function(){});
  } else if (navigator.clipboard && navigator.clipboard.writeText){
    navigator.clipboard.writeText(url)
      .then(function(){ flashConfirm('Copied!'); })
      .catch(function(){ flashConfirm('Copy failed'); });
  } else {
    flashConfirm('Copy failed');
  }
}
