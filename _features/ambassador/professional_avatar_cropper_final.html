<!DOCTYPE html>
<html><head><title>Professional Avatar Cropper — Final</title>
<style>
body{margin:0;padding:24px;background:#111;display:flex;flex-direction:column;gap:32px;align-items:center;font-family:system-ui,-apple-system,sans-serif}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
.frame{width:375px;height:680px;background:#000;border-radius:24px;overflow:hidden;color:#fff;border:2px solid #1a1a1a;position:relative}

.scrimTop{position:absolute;top:0;left:0;right:0;height:110px;background:linear-gradient(rgba(0,0,0,0.55),transparent);pointer-events:none;z-index:1}
.scrimBot{position:absolute;bottom:0;left:0;right:0;height:170px;background:linear-gradient(transparent,rgba(0,0,0,0.92));pointer-events:none;z-index:1}

.topBtn{position:absolute;top:20px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;cursor:pointer;z-index:4}
.cancelBtn{left:18px}
.useBtn{position:absolute;top:20px;right:18px;height:32px;display:flex;align-items:center;justify-content:center;padding:0 8px;font-size:14px;font-weight:600;color:#e91e8c;cursor:pointer;z-index:4}
.title{position:absolute;top:20px;left:50%;transform:translateX(-50%);height:32px;display:flex;align-items:center;font-size:14px;font-weight:500;color:#fff;z-index:4;pointer-events:none}

.cropStage{position:absolute;top:70px;bottom:170px;left:0;right:0;display:flex;align-items:center;justify-content:center;z-index:2}
.cropContainer{position:relative;width:280px;height:280px;cursor:grab;user-select:none;-webkit-user-select:none}
.cropContainer.dragging{cursor:grabbing}

.cropImage{position:absolute;top:50%;left:50%;max-width:none;max-height:none;pointer-events:none;user-select:none;-webkit-user-select:none;-webkit-user-drag:none}

/* Full-frame dim + border overlay. Single SVG sized to the frame bounds
   (375×680 in this mockup, window.innerWidth/Height in production), mask
   cutout positioned at the crop-container center. pointer-events:none so
   drag + slider still work through it. */
.cropOverlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:3}

.sliderWrap{position:absolute;bottom:48px;left:0;right:0;padding:0 32px;z-index:3}
.sliderRow{display:flex;align-items:center;gap:14px;height:20px}
.sliderIconBox{width:14px;height:20px;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.sliderTrack{flex:1;height:2px;background:rgba(255,255,255,0.2);border-radius:2px;position:relative;cursor:pointer}
.sliderFill{position:absolute;left:0;top:0;height:100%;background:#e91e8c;border-radius:2px;width:0%}
.sliderThumb{position:absolute;top:50%;transform:translate(-50%,-50%);width:14px;height:14px;background:#fff;border-radius:50%;box-shadow:0 1px 4px rgba(0,0,0,0.4);left:0%;cursor:grab}
.sliderThumb.dragging{cursor:grabbing}
.sliderHelper{text-align:center;font-size:11px;color:rgba(255,255,255,0.5);margin-top:12px}

.nativeRange{position:absolute;inset:-10px;opacity:0;cursor:pointer;width:calc(100% + 20px);height:40px}
</style></head><body>

<!--
  MOCKUP NOTE
  ────────────────────────────────────────────────────────────────────────────
  Professional avatar cropper — full-screen overlay.
  Drag image within the circular frame. Zoom slider (1–4x).
  Tap Use → canvas-exports 400x400 JPEG.
  Production renders this inside a portal/overlay on the Add Listing page.
  ────────────────────────────────────────────────────────────────────────────
-->

<div class="frame" id="cropperFrame">

  <div class="scrimTop"></div>
  <div class="scrimBot"></div>

  <div class="topBtn cancelBtn" onclick="cropCancel()" title="Cancel">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
      <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
    </svg>
  </div>

  <div class="title">Crop photo</div>

  <div class="useBtn" onclick="cropConfirm()">Use</div>

  <div class="cropStage">
    <div class="cropContainer" id="cropContainer">
      <img id="cropImage" class="cropImage" src="" alt="" />
    </div>
  </div>

  <!--
    Full-frame dim + frame border. Single SVG, pixel-coordinate (no viewBox),
    sized to the frame bounds. Mask uses maskUnits=userSpaceOnUse so the
    cutout coordinates match the outer rect's pixel space. Frame border
    rendered inside the same SVG to sit crisply over the dim/clear boundary.
    Frame center: horizontal = 375/2 = 187.5; vertical = 70 + (680−70−170)/2
    = 70 + 220 = 290.
  -->
  <svg class="cropOverlay" width="375" height="680">
    <defs>
      <mask id="circleMask" maskUnits="userSpaceOnUse" x="0" y="0" width="375" height="680">
        <rect x="0" y="0" width="375" height="680" fill="white"/>
        <circle cx="187.5" cy="290" r="140" fill="black"/>
      </mask>
    </defs>
    <rect x="0" y="0" width="375" height="680" fill="rgba(0,0,0,0.55)" mask="url(#circleMask)"/>
    <circle cx="187.5" cy="290" r="140" fill="none" stroke="#fff" stroke-width="2"/>
  </svg>

  <div class="sliderWrap">
    <div class="sliderRow">
      <div class="sliderIconBox">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <line x1="1" y1="5" x2="9" y2="5" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
      <div class="sliderTrack" id="sliderTrack">
        <div class="sliderFill" id="sliderFill"></div>
        <div class="sliderThumb" id="sliderThumb"></div>
        <input type="range" class="nativeRange" id="nativeRange" min="1" max="4" step="0.01" value="1"/>
      </div>
      <div class="sliderIconBox">
        <svg width="10" height="10" viewBox="0 0 10 10">
          <line x1="1" y1="5" x2="9" y2="5" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round"/>
          <line x1="5" y1="1" x2="5" y2="9" stroke="rgba(255,255,255,0.75)" stroke-width="1.5" stroke-linecap="round"/>
        </svg>
      </div>
    </div>
    <div class="sliderHelper">Drag to position · Slider to zoom</div>
  </div>

</div>

<script>
(function() {
  var FRAME_SIZE = 280;
  var OUTPUT_SIZE = 400;
  var ZOOM_MIN = 1, ZOOM_MAX = 4;

  var st = {
    naturalW: 0,
    naturalH: 0,
    zoom: 1,
    posX: 0,
    posY: 0,
    drag: { active: false, startX: 0, startY: 0, startPosX: 0, startPosY: 0 }
  };

  var img = document.getElementById('cropImage');
  var container = document.getElementById('cropContainer');
  var slider = document.getElementById('nativeRange');
  var fill = document.getElementById('sliderFill');
  var thumb = document.getElementById('sliderThumb');

  function loadImage(src) {
    var tmp = new Image();
    tmp.onload = function() {
      st.naturalW = tmp.naturalWidth;
      st.naturalH = tmp.naturalHeight;
      st.zoom = 1;
      st.posX = 0;
      st.posY = 0;
      img.src = src;
      img.setAttribute('data-src', src);
      updateImageTransform();
      updateSlider();
    };
    tmp.src = src;
  }

  function getRenderedSize() {
    var baseScale = Math.max(FRAME_SIZE / st.naturalW, FRAME_SIZE / st.naturalH);
    return {
      w: st.naturalW * baseScale * st.zoom,
      h: st.naturalH * baseScale * st.zoom
    };
  }

  function getBounds(zoom) {
    var baseScale = Math.max(FRAME_SIZE / st.naturalW, FRAME_SIZE / st.naturalH);
    var rW = st.naturalW * baseScale * zoom;
    var rH = st.naturalH * baseScale * zoom;
    return {
      maxX: Math.max(0, (rW - FRAME_SIZE) / 2),
      maxY: Math.max(0, (rH - FRAME_SIZE) / 2)
    };
  }

  function clampPos(x, y, zoom) {
    var b = getBounds(zoom);
    return {
      x: Math.max(-b.maxX, Math.min(b.maxX, x)),
      y: Math.max(-b.maxY, Math.min(b.maxY, y))
    };
  }

  function updateImageTransform() {
    if (!st.naturalW) return;
    var rendered = getRenderedSize();
    img.style.width = rendered.w + 'px';
    img.style.height = rendered.h + 'px';
    img.style.transform = 'translate(calc(-50% + ' + st.posX + 'px), calc(-50% + ' + st.posY + 'px))';
  }

  function updateSlider() {
    var pct = ((st.zoom - ZOOM_MIN) / (ZOOM_MAX - ZOOM_MIN)) * 100;
    fill.style.width = pct + '%';
    thumb.style.left = pct + '%';
    slider.value = st.zoom;
  }

  slider.addEventListener('input', function(e) {
    st.zoom = parseFloat(e.target.value);
    var c = clampPos(st.posX, st.posY, st.zoom);
    st.posX = c.x;
    st.posY = c.y;
    updateImageTransform();
    updateSlider();
  });

  function onDragStart(clientX, clientY) {
    st.drag.active = true;
    st.drag.startX = clientX;
    st.drag.startY = clientY;
    st.drag.startPosX = st.posX;
    st.drag.startPosY = st.posY;
    container.classList.add('dragging');
  }

  function onDragMove(clientX, clientY) {
    if (!st.drag.active) return;
    var dx = clientX - st.drag.startX;
    var dy = clientY - st.drag.startY;
    var c = clampPos(st.drag.startPosX + dx, st.drag.startPosY + dy, st.zoom);
    st.posX = c.x;
    st.posY = c.y;
    updateImageTransform();
  }

  function onDragEnd() {
    st.drag.active = false;
    container.classList.remove('dragging');
  }

  container.addEventListener('mousedown', function(e) {
    e.preventDefault();
    onDragStart(e.clientX, e.clientY);
  });
  document.addEventListener('mousemove', function(e) {
    onDragMove(e.clientX, e.clientY);
  });
  document.addEventListener('mouseup', onDragEnd);

  container.addEventListener('touchstart', function(e) {
    if (e.touches.length !== 1) return;
    onDragStart(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  document.addEventListener('touchmove', function(e) {
    if (e.touches.length !== 1) return;
    onDragMove(e.touches[0].clientX, e.touches[0].clientY);
  }, { passive: true });
  document.addEventListener('touchend', onDragEnd);

  window.cropCancel = function() {
    alert('Cancel → close overlay without saving.');
  };

  window.cropConfirm = function() {
    if (!st.naturalW) {
      alert('Load an image first.');
      return;
    }
    var canvas = document.createElement('canvas');
    canvas.width = OUTPUT_SIZE;
    canvas.height = OUTPUT_SIZE;
    var ctx = canvas.getContext('2d');

    var rendered = getRenderedSize();
    var srcScale = st.naturalW / rendered.w;
    var srcW = FRAME_SIZE * srcScale;
    var srcH = FRAME_SIZE * srcScale;
    var srcX = (st.naturalW - srcW) / 2 - (st.posX * srcScale);
    var srcY = (st.naturalH - srcH) / 2 - (st.posY * srcScale);

    ctx.drawImage(img, srcX, srcY, srcW, srcH, 0, 0, OUTPUT_SIZE, OUTPUT_SIZE);

    canvas.toBlob(function(blob) {
      var url = URL.createObjectURL(blob);
      var w = window.open();
      w.document.write('<img src="' + url + '" style="display:block;margin:40px auto;width:400px;height:400px;border-radius:50%;border:2px solid #e91e8c"/><p style="text-align:center;font-family:system-ui">' + Math.round(blob.size / 1024) + ' KB · ' + blob.type + '</p>');
    }, 'image/jpeg', 0.9);
  };

  loadImage('https://images.unsplash.com/photo-1544005313-94ddf0286df2?w=800');
})();
</script>

</body></html>
