<!DOCTYPE html>
<html lang="en"><head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Payouts — WeLoveDecode</title>
<style>
body{margin:0;padding:24px 0;background:#111;display:flex;justify-content:center;font-family:system-ui,-apple-system,sans-serif}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}

#poPage{width:375px;background:#000;border-radius:24px;overflow:hidden;color:#fff;border:2px solid #1a1a1a}

.po-back{cursor:pointer;transition:transform 0.05s}
.po-back:active{transform:scale(0.9)}

.po-row{
  display:flex;justify-content:space-between;align-items:center;
  padding:14px 0;border-bottom:1px solid #1f1f1f;cursor:pointer;
  transition:background-color 0.12s;border-radius:8px;
  margin:0 -8px;padding-left:8px;padding-right:8px;
}
.po-row:hover{background:#262626}
.po-row:last-child{border-bottom:none}
</style></head>
<body>

<div id="poPage">

<!-- Header with back arrow -->
<div style="padding:16px 20px 20px;display:flex;align-items:center;gap:12px">
<svg id="poBack" class="po-back" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="12" x2="5" y2="12"/><polyline points="12 19 5 12 12 5"/></svg>
<span style="font-size:20px;font-weight:700">Payouts</span>
</div>

<!-- Next payout card -->

<div style="font-size:11px;color:#666">Next payout</div>
<div style="background:#34d399;border-radius:20px;padding:4px 10px;font-size:9px;font-weight:700;color:#000;letter-spacing:0.3px">SCHEDULED</div>
</div>
<div style="display:flex;align-items:baseline;gap:8px">
<div id="poNextAmount" style="font-size:28px;font-weight:700;letter-spacing:-0.3px">$340.00</div>
<div id="poNextCurrency" style="font-size:11px;font-weight:600;color:#666;letter-spacing:0.8px">USD</div>
</div>
<div id="poNextDate" style="font-size:10px;color:#777;margin-top:4px">Wednesday, 15 April 2026</div>
</div>
</div>

<!-- History card -->
<div style="padding:0 20px 16px">
<div style="background:#1c1c1c;border-radius:14px;padding:18px 18px 8px">

<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:16px">
<div>
<div style="font-size:11px;color:#666;text-align:left">Total</div>
<div id="poHistCount" style="font-size:10px;color:#777;margin-top:4px;text-align:left">5 payouts</div>
</div>
<span id="poHistTotal" style="font-size:22px;font-weight:700;letter-spacing:-0.2px">$1,740.00</span>
</div>

<div style="height:1px;background:#1f1f1f;margin:0 -18px 4px"></div>

<!-- Payout rows — dynamically rendered in production via JS loop -->
<div id="poList">

<div class="po-row" data-pid="P8473921">
<div>

<div style="font-size:10px;color:#777;margin-top:4px">P8473921</div>

<div style="padding:20px"></div>
</div>

<script>
(function(){
  // ===========================================================================
  // Payouts list — /model/payouts
  // ---------------------------------------------------------------------------
  // Reached from /model/analytics via "View payouts →" link.
  //
  // DATA (production)
  //   GET /api/model/payouts
  //     → { next: {amount, currency, scheduled_for},
  //         history: [{id, date, amount, status}, ...] }
  //
  // BACK ARROW
  //   history.back() → returns to analytics
  //   Falls back to /model/analytics if no history entry
  //
  // ROW TAP
  //   Navigates to /model/payouts/{id} — the detail page
  //   (Not an overlay — a real URL for deep-linking + sharing)
  // ===========================================================================

  // Back arrow — returns to analytics
  var backBtn = document.getElementById('poBack');
  if (backBtn) {
    backBtn.addEventListener('click', function(){
      if (window.history.length > 1) window.history.back();
      else window.location.href = '/model/analytics';
    });
  }

  // Row tap — navigate to statement detail
  var rows = document.querySelectorAll('.po-row');
  for (var i = 0; i < rows.length; i++) {
    rows[i].addEventListener('click', function(e){
      var pid = e.currentTarget.getAttribute('data-pid');
      if (pid) window.location.href = '/model/payouts/' + encodeURIComponent(pid);
    });
  }
})();
</script>

</body></html>
