<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#000000">
<title>DECODE</title>
<meta name="description" content="The first beauty company that pays women for their taste.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;1,400;1,500;1,600;1,700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body { background: #000; height: 100%; }
body {
  font-family: 'Inter', -apple-system, system-ui, sans-serif;
  min-height: 100vh;
  color: #FFF;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
  overflow-x: hidden;
}

body.overlay-open { overflow: hidden; height: 100vh; }

.gate {
  max-width: 440px;
  margin: 0 auto;
  min-height: 100vh;
  padding: env(safe-area-inset-top) 28px env(safe-area-inset-bottom);
  display: flex;
  flex-direction: column;
  align-items: center;
  opacity: 0;
  transition: opacity 0.5s ease;
}
.gate.visible { opacity: 1; }

.gate-nav {
  width: 100%;
  display: flex;
  justify-content: flex-end;
  align-items: center;
  padding: 32px 0 0;
  height: 48px;
  box-sizing: border-box;
}
.gate-note-link {
  font-size: 12px;
  color: #FFF;
  letter-spacing: 0.6px;
  cursor: pointer;
  background: none;
  border: none;
  font-family: inherit;
  padding: 8px 0;
  margin: 0;
}

.gate-logo-wrap {
  margin-top: 94px;
  margin-bottom: auto;
}
.gate-logo {
  height: 38px;
  width: auto;
  display: block;
  filter: brightness(0) invert(1);
}
.gate-logo {
  height: 32px;
  width: auto;
  display: block;
  filter: brightness(0) invert(1);
}

.gate-actions {
  display: flex;
  flex-direction: column;
  gap: 8px;
  width: 100%;
  padding-bottom: 160px;
  align-items: stretch;
}
.gate-link {
  display: block;
  width: 100%;
  background: transparent;
  color: #FFF;
  border: none;
  padding: 22px 20px;
  text-align: center;
  font-size: 14px;
  font-weight: 400;
  letter-spacing: 0.5px;
  text-decoration: none;
  font-family: inherit;
  cursor: pointer;
  transition: opacity 0.2s ease;
}
.gate-link:hover { opacity: 0.65; }
.gate-link:active { opacity: 0.5; }

.founder-overlay {
  position: fixed;
  inset: 0;
  background: #000;
  z-index: 50;
  transform: translateY(100%);
  transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
}
.founder-overlay.shown {
  transform: translateY(0);
}
.founder-inner {
  max-width: 440px;
  margin: 0 auto;
}
.founder-nav {
  display: flex;
  flex-direction: row;
  justify-content: space-between;
  align-items: center;
  padding: 32px 28px 80px;
  width: 100%;
}
.founder-logo {
  height: 26px;
  width: auto;
  display: block;
  filter: brightness(0) invert(1);
  margin-right: auto;
}
.founder-close {
  font-size: 28px;
  color: #FFF;
  background: none;
  border: none;
  cursor: pointer;
  line-height: 0.8;
  padding: 8px 12px;
  margin: -8px -12px -8px auto;
  font-weight: 300;
  font-family: inherit;
}
.founder-content {
  text-align: center;
  padding: 0 32px 80px;
}
.founder-line {
  font-family: 'Cormorant Garamond', Georgia, serif;
  font-style: italic;
  font-size: 21px;
  line-height: 1.45;
  color: #FFF;
  margin-bottom: 20px;
  font-weight: 400;
  letter-spacing: -0.2px;
}
.founder-line.cta {
  font-weight: 600;
  margin-top: 8px;
  margin-bottom: 24px;
}
.founder-signature {
  display: block;
  margin: 0 auto;
  width: 100%;
  max-width: 380px;
  height: 100px;
  object-fit: cover;
  object-position: center center;
}

.bloom {
  position: fixed;
  inset: 0;
  z-index: 100;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.5s ease;
  background: #000;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.bloom.active {
  opacity: 1;
}
.bloom-img {
  width: 130%;
  height: 130%;
  object-fit: cover;
  transform: scale(1.04);
  transition: transform 0.7s cubic-bezier(0.16, 1, 0.3, 1);
}
.bloom.active .bloom-img {
  transform: scale(1);
}
</style>
</head>
<body>

<main class="gate visible" id="gate">
  <nav class="gate-nav">
    <button class="gate-note-link" type="button" id="open-founder">A note from us →</button>
  </nav>
  <div class="gate-logo-wrap">
    <img class="gate-logo" src="/logo.png" alt="DECODE" />
  </div>
  <div class="gate-actions">
    <a class="gate-link" href="https://app.welovedecode.com/ambassador" data-target="https://app.welovedecode.com/ambassador">I'm an Ambassador →</a>
    <a class="gate-link" href="https://app.welovedecode.com/professional" data-target="https://app.welovedecode.com/professional">I'm a Beauty Professional →</a>
  </div>
</main>

<div class="founder-overlay" id="founder-overlay" role="dialog" aria-label="A note from the founder" aria-hidden="true">
  <div class="founder-inner">
    <nav class="founder-nav">
      <img class="founder-logo" src="/logo.png" alt="DECODE" />
      <button class="founder-close" type="button" id="founder-close" aria-label="Close">×</button>
    </nav>
    <div class="founder-content">
      <p class="founder-line">The beauty industry is broken.</p>
      <p class="founder-line">Trust is at an all-time low.</p>
      <p class="founder-line">We put our heart and soul into crafting tools to fix what has been lost.</p>
      <p class="founder-line cta">Come build it with us.</p>
      <img class="founder-signature" src="https://vdgjzaaxvstbouklgsft.supabase.co/storage/v1/object/public/marketing/founder/Signature_no%20line.png" alt="Sila" />
    </div>
  </div>
</div>

<div class="bloom" id="bloom" aria-hidden="true">
  <img class="bloom-img" src="https://vdgjzaaxvstbouklgsft.supabase.co/storage/v1/object/public/marketing/brand/DECODE%20Pattern_4k.jpeg" alt="" />
</div>

<script>
  const founderOverlay = document.getElementById('founder-overlay');
  const founderClose = document.getElementById('founder-close');
  const openFounderBtn = document.getElementById('open-founder');
  const bloom = document.getElementById('bloom');

  function openFounder() {
    founderOverlay.classList.add('shown');
    founderOverlay.setAttribute('aria-hidden', 'false');
    document.body.classList.add('overlay-open');
    founderOverlay.scrollTop = 0;
  }
  function dismissFounder() {
    founderOverlay.classList.remove('shown');
    founderOverlay.setAttribute('aria-hidden', 'true');
    document.body.classList.remove('overlay-open');
  }

  openFounderBtn.addEventListener('click', openFounder);
  founderClose.addEventListener('click', dismissFounder);
  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape' && founderOverlay.classList.contains('shown')) {
      dismissFounder();
    }
  });

  document.querySelectorAll('.gate-link').forEach(function(btn) {
    btn.addEventListener('click', function(e) {
      e.preventDefault();
      const target = btn.getAttribute('data-target');
      bloom.classList.add('active');
      setTimeout(function() {
        window.location.href = target;
      }, 1100);
    });
  });

  // Reset bloom + overlay state when page is restored from browser back/forward cache.
  // Without this, hitting "back" from /ambassador or /professional would show the user
  // a frozen bloom overlay with no way to navigate.
  window.addEventListener('pageshow', function(e) {
    bloom.classList.remove('active');
    if (founderOverlay) {
      founderOverlay.classList.remove('shown');
      founderOverlay.setAttribute('aria-hidden', 'true');
    }
    document.body.classList.remove('overlay-open');
  });
</script>

</body>
</html>
