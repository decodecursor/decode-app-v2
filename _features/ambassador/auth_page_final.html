function formatPhoneNumber(digits, dialCode){
  const mask = phoneFormats[dialCode];
  if(!mask) return digits; // no mask for this country, return raw digits
  let out = '';
  let di = 0;
  // Apply the mask for as many digits as fit
  for(let i = 0; i < mask.length && di < digits.length; i++){
    if(mask[i] === '#'){
      out += digits[di];
      di++;
    } else {
      out += mask[i];
    }
  }
  // Append any overflow digits with a leading space (variable-length countries)
  if(di < digits.length){
    out += ' ' + digits.slice(di);
  }
  return out;
}

function buildList(){
  const list = document.getElementById('countryList');
  const popular = countries.filter(c => c.popular);
  const rest = countries.filter(c => !c.popular).sort((a,b) => a.name.localeCompare(b.name));

  let html = '';

  // POPULAR section
  html += `<div id="section-popular" style="font-size:10px;letter-spacing:1px;color:#888;font-weight:700;padding:14px 0 6px">POPULAR</div>`;
  html += popular.map(rowHtml).join('');

  // A-Z sections with anchors
  let currentLetter = '';
  rest.forEach(c => {
    const firstLetter = c.name.charAt(0).toUpperCase();
    if(firstLetter !== currentLetter){
      currentLetter = firstLetter;
      html += `<div id="section-${currentLetter}" style="font-size:10px;letter-spacing:1px;color:#888;font-weight:700;padding:18px 0 6px">${currentLetter}</div>`;
    }
    html += rowHtml(c);
  });

  list.innerHTML = html;
}

function filterList(q){
  const list = document.getElementById('countryList');
  const qLower = q.toLowerCase().trim();

  const match = c => c.name.toLowerCase().includes(qLower) || c.dial.includes(qLower) || c.code.toLowerCase().includes(qLower);

  const matches = countries.filter(match).sort((a,b) => a.name.localeCompare(b.name));

  if(matches.length === 0){
    list.innerHTML = `<div style="padding:40px 20px;text-align:center;color:#666;font-size:13px">No countries found</div>`;
    return;
  }

  let html = '';
  matches.forEach(c => { html += rowHtml(c); });
  list.innerHTML = html;
}

window.handlePhoneInput = function(el){
  // Get current dial code from selected country button
  const dialCode = document.getElementById('selCode').textContent;
  // Strip non-digits and apply country-specific format mask
  const digits = el.value.replace(/\D/g,'');
  const formatted = formatPhoneNumber(digits, dialCode);
  // Only update if actually different (prevents cursor jump on non-format chars)
  if(el.value !== formatted){
    el.value = formatted;
  }
  const btn = document.getElementById('waBtn');
  const label = document.getElementById('waLabel');
  // Minimum 6 digits required to activate — safe floor, backend validates exact length per country
  if(digits.length >= 6){
    btn.style.borderColor = '#e91e8c';
    btn.style.background = '#e91e8c';
    label.style.color = '#fff';
  } else {
    btn.style.borderColor = '#2a2a2a';
    btn.style.background = 'transparent';
    label.style.color = '#555';
  }
};
