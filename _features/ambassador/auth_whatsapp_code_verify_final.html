<html><head><title>WhatsApp Code Verify — Final</title>
<style>
body{margin:0;padding:24px;background:#111;display:flex;justify-content:center;font-family:system-ui,-apple-system,sans-serif}
*{-webkit-tap-highlight-color:transparent;box-sizing:border-box}
input{outline:none;border:none;background:transparent;font-family:inherit}
.frame{width:375px;background:#000;border-radius:24px;overflow:hidden;color:#fff;border:2px solid #1a1a1a;position:relative}
.statusBar{padding:12px 20px 0;font-size:12px;color:#888}
.content{padding:60px 22px 20px;text-align:center}
.title{font-size:22px;font-weight:700;margin-bottom:9px;letter-spacing:-0.2px}
.sent{font-size:11px;color:#888;line-height:1.6;max-width:280px;margin:0 auto 36px}

.codeRow{display:flex;gap:8px;justify-content:center;margin-bottom:24px}
.codeBox{
  width:42px;height:54px;
  background:transparent;
  border:1.5px solid #262626;
  border-radius:10px;
  font-size:22px;font-weight:700;color:#fff;
  text-align:center;
  caret-color:#e91e8c;
  transition:border-color 0.15s;
  -webkit-appearance:none;-moz-appearance:textfield;
}
.codeBox::-webkit-outer-spin-button,.codeBox::-webkit-inner-spin-button{-webkit-appearance:none;margin:0}
.codeBox.filled{border-color:#e91e8c}
.codeBox.active{border-color:#e91e8c}
.codeBox.error{border-color:#ef4444}
.shake{animation:shake 0.45s cubic-bezier(0.36,0.07,0.19,0.97)}
@keyframes shake{
  10%,90%{transform:translateX(-1px)}
  20%,80%{transform:translateX(2px)}
  30%,50%,70%{transform:translateX(-4px)}
  40%,60%{transform:translateX(4px)}
}

.verifyBtn{
  background:#1c1c1c;
  border:1px solid #262626;
  border-radius:12px;
  padding:15px;
  font-size:15px;font-weight:700;color:#555;
  cursor:not-allowed;
  margin-bottom:28px;
  letter-spacing:0.2px;
  transition:all 0.2s;
}
.verifyBtn.ready{
  background:#e91e8c;
  border-color:#e91e8c;
  color:#fff;
  cursor:pointer;
}
.verifyBtn.verifying{
  background:#e91e8c;
  border-color:#e91e8c;
  color:#fff;
}
.verifyBtn.success{
  background:#e91e8c;
  border-color:#e91e8c;
  color:#fff;
}

.tracker{padding:0 8px;margin-bottom:36px}
.trackerRow{display:flex;align-items:center}
.stepDone{width:20px;height:20px;border-radius:50%;background:#e91e8c;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.stepActive{width:20px;height:20px;border-radius:50%;border:1.5px solid #e91e8c;background:transparent;display:flex;align-items:center;justify-content:center;flex-shrink:0;box-sizing:border-box}
.stepActive > div{width:6px;height:6px;border-radius:50%;background:#e91e8c}
.stepFuture{width:20px;height:20px;border-radius:50%;border:1.5px solid #3a3a3a;background:transparent;flex-shrink:0;box-sizing:border-box}
.railSolid{flex:1;height:1.5px;background:#e91e8c;margin:0 2px}
.railDashed{flex:1;height:1.5px;background-image:repeating-linear-gradient(90deg,#3a3a3a 0 3px,transparent 3px 6px);background-size:100% 100%;margin:0 2px}
.labels{display:grid;grid-template-columns:20px 1fr 20px 1fr 20px;margin-top:10px}
.labelCell{position:relative}
.labelCell span{font-size:9px;font-weight:600;position:absolute;white-space:nowrap}
.labelDone,.labelFuture{color:#777}
.labelActive{color:#e91e8c;font-weight:700!important}
.labelLeft{left:0}
.labelCenter{left:50%;transform:translateX(-50%)}
.labelRight{right:0}

.expires{font-size:11px;color:#888;margin-bottom:8px}
.resendRow{font-size:11px;color:#888;line-height:18px;height:18px}
.resend{color:#e91e8c;font-weight:600;cursor:pointer;transition:color 0.2s;display:inline-block;min-width:44px;text-align:center;vertical-align:baseline;line-height:18px;height:18px}
.resend.sent{color:#4ade80}
</style></head><body>

<div class="frame">

<div class="statusBar">9:41</div>

<div class="content">

<div class="title">Enter your code</div>
<div class="sent">We sent a code to <span id="phoneLink" style="color:#fff;font-weight:600"></span> on WhatsApp</div>

<div class="codeRow">
<input class="codeBox" id="c0" type="text" inputmode="numeric" maxlength="1" autocomplete="one-time-code" oninput="onInput(0)" onkeydown="onKey(event,0)">
<input class="codeBox" id="c1" type="text" inputmode="numeric" maxlength="1" oninput="onInput(1)" onkeydown="onKey(event,1)">
<input class="codeBox" id="c2" type="text" inputmode="numeric" maxlength="1" oninput="onInput(2)" onkeydown="onKey(event,2)">
<input class="codeBox" id="c3" type="text" inputmode="numeric" maxlength="1" oninput="onInput(3)" onkeydown="onKey(event,3)">
<input class="codeBox" id="c4" type="text" inputmode="numeric" maxlength="1" oninput="onInput(4)" onkeydown="onKey(event,4)">
<input class="codeBox" id="c5" type="text" inputmode="numeric" maxlength="1" oninput="onInput(5)" onkeydown="onKey(event,5)">
</div>

<div class="verifyBtn" id="verifyBtn" onclick="verify()">Verify</div>

<div class="tracker">
<div class="trackerRow">
<div class="stepDone">
<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
</div>
<div class="railSolid"></div>
<div class="stepActive" id="step2"><div></div></div>
<div class="railDashed" id="rail2"></div>
<div class="stepFuture" id="step3"></div>
</div>
<div class="labels">
<div class="labelCell"><span class="labelDone labelLeft">Sent</span></div>
<div></div>
<div class="labelCell"><span class="labelActive labelCenter" id="label2">Enter code</span></div>
<div></div>
<div class="labelCell"><span class="labelFuture labelRight" id="label3">Done</span></div>
</div>
</div>

<div class="expires">Your code expires in 10 minutes</div>
<div class="resendRow">
Didn't receive it? <span class="resend" id="resendBtn" onclick="resend()">Resend</span>
</div>

</div>

</div>

<script>
function boxes(){return Array.from(document.querySelectorAll('.codeBox'));}

function onInput(i){
  const box=document.getElementById('c'+i);
  const v=box.value.replace(/[^0-9]/g,'');
  box.value=v;
  if(v){
    box.classList.add('filled');
    if(i<5){
      const next=document.getElementById('c'+(i+1));
      next.focus();
    }
  }else{
    box.classList.remove('filled');
  }
  updateVerifyState();
}

function onKey(e,i){
  if(e.key==='Backspace'&&!e.target.value&&i>0){
    const prev=document.getElementById('c'+(i-1));
    prev.focus();
    prev.value='';
    prev.classList.remove('filled');
    updateVerifyState();
  }
}

function updateVerifyState(){
  const btn=document.getElementById('verifyBtn');
  const all=boxes().every(function(b){return b.value.length===1;});
  if(all){
    btn.classList.add('ready');
  }else{
    btn.classList.remove('ready');
  }
}

function getCode(){return boxes().map(function(b){return b.value;}).join('');}

function verify(){
  const btn=document.getElementById('verifyBtn');
  if(!btn.classList.contains('ready'))return;
  const code=getCode();
  btn.textContent='Verifying…';
  btn.classList.add('verifying');
  setTimeout(function(){
    // Mockup: any 6-digit code = success (production: server validates)
    if(code.length===6){
      btn.textContent='Verified!';
      btn.classList.remove('verifying');
      btn.classList.add('success');
      advanceTracker();
    }else{
      btn.textContent='Verify';
      btn.classList.remove('verifying');
      showError();
    }
  },800);
}

function showError(){
  const row=document.querySelector('.codeRow');
  boxes().forEach(function(b){b.classList.add('error');});
  row.classList.add('shake');
  setTimeout(function(){
    row.classList.remove('shake');
    boxes().forEach(function(b){
      b.classList.remove('error');
      b.classList.remove('filled');
      b.value='';
    });
    boxes()[0].focus();
    updateVerifyState();
  },500);
}

function advanceTracker(){
  // Step 2 becomes completed
  const step2=document.getElementById('step2');
  step2.className='stepDone';
  step2.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
  // Rail 2 becomes solid
  const rail2=document.getElementById('rail2');
  rail2.className='railSolid';
  // Step 3 becomes active
  const step3=document.getElementById('step3');
  step3.className='stepActive';
  step3.innerHTML='<div></div>';
  // Labels update
  document.getElementById('label2').className='labelDone labelCenter';
  document.getElementById('label3').className='labelActive labelRight';

  // Completion dwell — brief pause so the user registers the active state,
  // then fill in the terminal step and show redirect toast
  setTimeout(function(){
    step3.className='stepDone';
    step3.innerHTML='<svg width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>';
    document.getElementById('label3').className='labelDone labelRight';
    showToast('Signed in · redirecting…');
  }, 450);
}

function showToast(msg){
  let t=document.getElementById('toast');
  if(!t){
    t=document.createElement('div');
    t.id='toast';
    t.style.cssText='position:fixed;left:50%;bottom:40px;transform:translateX(-50%);background:rgba(28,28,28,0.95);border:1px solid #333;color:#fff;padding:10px 18px;border-radius:24px;font-size:12px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:1000;font-family:system-ui,-apple-system,sans-serif;white-space:nowrap';
    document.body.appendChild(t);
  }
  t.textContent=msg;
  t.style.opacity='1';
  clearTimeout(t._timer);
  t._timer=setTimeout(function(){t.style.opacity='0';},1800);
}

function resend(){
  const r=document.getElementById('resendBtn');
  if(r.classList.contains('sent'))return;
  if(resendCooldown>0)return;
  // PRODUCTION: re-trigger AUTHKey API with current phone number
  // POST to AUTHKey send-code endpoint, invalidate previous code server-side
  r.textContent='Sent!';
  r.classList.add('sent');
  resendCooldown=60;
  setTimeout(function(){
    r.classList.remove('sent');
    tickCooldown();
  },2000);
}
function tickCooldown(){
  const r=document.getElementById('resendBtn');
  if(resendCooldown<=0){
    r.textContent='Resend';
    r.style.opacity='1';
    r.style.cursor='pointer';
    return;
  }
  r.textContent='Resend ('+resendCooldown+'s)';
  r.style.opacity='0.5';
  r.style.cursor='not-allowed';
  resendCooldown--;
  resendTimer=setTimeout(tickCooldown,1000);
}


// Pull phone from URL param ?phone=+971558462387 (or fallback for mockup)
(function(){
  const params=new URLSearchParams(window.location.search);
  const phone=params.get('phone')||'+971 55 846 2387';
  document.getElementById('phoneLink').textContent=phone;
})();

// Resend cooldown (30s)
let resendCooldown=0;
let resendTimer=null;

// Auto-focus first box
boxes()[0].focus();
</script>
</body></html>
