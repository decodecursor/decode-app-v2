<script>
(function(){
  var st = {
    photo: null,
    rawProfile: null,
    rawMedia: null,
    category: '',
    customCategory: '',
    showCustom: false,
    video: null,
    images: [],
    p30: '', p60: '', p90: '',
    touched: { p30: false, p60: false, p90: false },
    freeTrial: false,
    cropperMode: null,
    naturalW: 0, naturalH: 0,
    zoom: 1, posX: 0, posY: 0,
    drag: { dragging: false, startX: 0, startY: 0, startPosX: 0, startPosY: 0 }
  };

  var PROFILE = 280;
  var MEDIA_W = 315, MEDIA_H = 560;

  function $(id) { return document.getElementById(id); }

  // ===== Utilities =====
  window.alCapFirst = function(input) {
    var v = input.value;
    if (v.length > 0) {
      var newV = v.charAt(0).toUpperCase() + v.slice(1);
      if (newV !== v) input.value = newV;
    }
  };

  // ===== Category dropdown =====
  window.alToggleCatDrop = function() {
    var dd = $('al_catDrop');
    dd.style.display = dd.style.display === 'block' ? 'none' : 'block';
  };

  // ===========================================================================
  // CATEGORIES — single source of truth
  // ---------------------------------------------------------------------------
  // Fetches the active category list from /api/categories. Any client surface
  // that needs categories (this form, public page filters, dashboard analytics)
  // should call this same endpoint so the list stays in sync across the app.
  //
  // Endpoint contract (server returns JSON array):
  //   [
  //     { "slug": "hair",    "label": "Hair",    "order": 1, "active": true },
  //     { "slug": "nails",   "label": "Nails",   "order": 2, "active": true },
  //     ...
  //   ]
  //
  // - slug:   stable identifier stored in listings.category (never renamed)
  // - label:  user-facing text (localizable later)
  // - order:  display sequence (admin-controlled)
  // - active: soft-disable without deleting (hidden from new listings only)
  //
  // Only active === true entries are shown. Sorted by `order` ascending.
  //
  // If the fetch fails (offline, CORS, 500), we fall back to FALLBACK_CATEGORIES
  // so the page still works. The fallback is the current seed list — replace
  // with whatever the server returns once /api/categories ships.
  //
  // Result is cached on window.WLD_CATEGORIES for any other component on the
  // same page to read without re-fetching.
  //
  // "Customize" is NOT part of the data — it's a UI concept (user escape hatch)
  // appended as a sticky last row in the dropdown.
  // ===========================================================================

  var FALLBACK_CATEGORIES = [
    { slug: 'hair',    label: 'Hair',    order: 1, active: true },
    { slug: 'nails',   label: 'Nails',   order: 2, active: true },
    { slug: 'skin',    label: 'Skin',    order: 3, active: true },
    { slug: 'lashes',  label: 'Lashes',  order: 4, active: true },
    { slug: 'brows',   label: 'Brows',   order: 5, active: true },
    { slug: 'nose',    label: 'Nose',    order: 6, active: true },
    { slug: 'veneers', label: 'Veneers', order: 7, active: true },
    { slug: 'botox',   label: 'Botox',   order: 8, active: true },
    { slug: 'fillers', label: 'Fillers', order: 9, active: true },
    { slug: 'massage', label: 'Massage', order: 10, active: true }
  ];

  function renderCategoryDropdown(categories) {
    var drop = $('al_catDrop');
    if (!drop) return;
    var active = categories
      .filter(function(c){ return c.active !== false; })
      .sort(function(a, b){ return (a.order || 0) - (b.order || 0); });

    var html = '';
    active.forEach(function(c){
      // Escape the label — simple guard against malformed server data
      var safe = String(c.label).replace(/"/g, '&quot;').replace(/</g, '&lt;');
      html += '<div style="padding:12px 16px;font-size:13px;cursor:pointer;border-bottom:1px solid #262626" ' +
              'onclick="alSelectCat(\'' + String(c.label).replace(/'/g, "\\'") + '\')">' + safe + '</div>';
    });
    // Customize — sticky last row, pink text, top border divider
    html += '<div style="padding:12px 16px;font-size:13px;cursor:pointer;color:#e91e8c;border-top:1px solid #333" ' +
            'onclick="alSelectCat(\'Customize\')">Customize</div>';
    drop.innerHTML = html;
  }

  function loadCategories() {
    // Try the live endpoint first
    if (typeof fetch === 'function') {
      fetch('/api/categories', { headers: { 'Accept': 'application/json' } })
        .then(function(res){
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function(data){
          if (!Array.isArray(data) || data.length === 0) throw new Error('empty');
          window.WLD_CATEGORIES = data;
          renderCategoryDropdown(data);
        })
        .catch(function(){
          // Silent fallback — mockup + offline + server down all keep working
          window.WLD_CATEGORIES = FALLBACK_CATEGORIES;
          renderCategoryDropdown(FALLBACK_CATEGORIES);
        });
    } else {
      window.WLD_CATEGORIES = FALLBACK_CATEGORIES;
      renderCategoryDropdown(FALLBACK_CATEGORIES);
    }
  }

  // Populate on page load
  loadCategories();

  // ===========================================================================
  // USER CURRENCY — reference data for the current authenticated user
  // ---------------------------------------------------------------------------
  // Fetches the logged-in user's preferred currency (set during onboarding)
  // from /api/user/me and updates the Pricing header label accordingly. Same
  // pattern as categories: live endpoint with a local fallback so the page
  // always works offline or during server outages.
  //
  // Endpoint contract (server returns JSON object):
  //   {
  //     "id":       "uuid",
  //     "currency": "AED",
  //     "symbol":   "د.إ",
  //     ...
  //   }
  //
  // - currency: ISO 4217 code set during onboarding (Supabase: users.currency)
  // - symbol:   display symbol for the currency
  //
  // Only currency and symbol are read here; the rest of the user object is
  // ignored by this loader but may be consumed by other components on the
  // same page (e.g., greeting, slug display).
  //
  // Result is cached on window.WLD_USER so any other component on the same
  // page can read the same user without re-fetching.
  //
  // MOCKUP FALLBACK: the default below ships as USD. In production the fetch
  // hits /api/user/me and the real currency replaces it before the user sees
  // the Pricing header.
  // ===========================================================================

  var FALLBACK_USER = {
    currency: 'USD',
    symbol:   '$'
  };

  function renderPriceCurrency(user) {
    var el = $('al_priceCurrency');
    if (!el || !user) return;
    var code = user.currency || 'USD';
    var symbol = user.symbol || '$';
    el.textContent = code + ' (' + symbol + ')';
  }

  function loadUserCurrency() {
    if (typeof fetch === 'function') {
      fetch('/api/user/me', { headers: { 'Accept': 'application/json' } })
        .then(function(res){
          if (!res.ok) throw new Error('HTTP ' + res.status);
          return res.json();
        })
        .then(function(data){
          if (!data || !data.currency) throw new Error('no currency');
          window.WLD_USER = data;
          renderPriceCurrency(data);
        })
        .catch(function(){
          window.WLD_USER = FALLBACK_USER;
          renderPriceCurrency(FALLBACK_USER);
        });
    } else {
      window.WLD_USER = FALLBACK_USER;
      renderPriceCurrency(FALLBACK_USER);
    }
  }

  loadUserCurrency();

  window.alSelectCat = function(cat) {
    st.category = cat;
    var lbl = $('al_catLabel');
    lbl.textContent = cat;
    if (cat === 'Customize') {
      st.showCustom = true;
      lbl.style.color = '#e91e8c';
      $('al_customCatWrap').style.display = 'block';
      setTimeout(function(){var el=$('al_customCat');if(el)el.focus();},50);
    } else {
      st.showCustom = false;
      st.customCategory = '';
      lbl.style.color = '#fff';
      $('al_customCatWrap').style.display = 'none';
      $('al_customCat').value = '';
      $('al_customCatCheck').style.display = 'none';
    }
    $('al_catDrop').style.display = 'none';
    alValidate();
  };

  window.alCustomCatCheck = function() {
    var v = $('al_customCat').value.trim();
    st.customCategory = v;
    var check = $('al_customCatCheck');
    var lbl = $('al_catLabel');
    if (v.length >= 2) {
      check.style.display = 'flex';
      lbl.textContent = v;
      lbl.style.color = '#fff';
    } else {
      check.style.display = 'none';
      lbl.textContent = 'Customize';
      lbl.style.color = '#e91e8c';
    }
  };

  // ===== Profile photo upload → cropper =====
  window.alOpenCropper = function(input, mode) {
    var file = input.files[0];
    if (!file) return;
    var reader = new FileReader();
    reader.onload = function(ev) {
      if (mode === 'profile') {
        st.rawProfile = ev.target.result;
      } else {
        st.rawMedia = ev.target.result;
      }
      st.cropperMode = mode;
      st.zoom = 1; st.posX = 0; st.posY = 0;
      $('al_zoomSlider').value = 1;
      openCropperModal();
    };
    reader.readAsDataURL(file);
    input.value = '';
  };

  function openCropperModal() {
    var modal = $('al_cropperModal');
    var container = $('al_cropContainer');
    var frame = $('al_cropFrame');
    var img = $('al_cropImage');
    var w, h;
    if (st.cropperMode === 'profile') {
      w = PROFILE; h = PROFILE;
      container.style.borderRadius = '50%';
      frame.style.borderRadius = '50%';
    } else {
      w = MEDIA_W; h = MEDIA_H;
      container.style.borderRadius = '8px';
      frame.style.borderRadius = '8px';
    }
    container.style.width = w + 'px';
    container.style.height = h + 'px';
    img.src = st.cropperMode === 'profile' ? st.rawProfile : st.rawMedia;
    img.onload = function() {
      st.naturalW = img.naturalWidth;
      st.naturalH = img.naturalHeight;
      st.zoom = 1; st.posX = 0; st.posY = 0;
      $('al_zoomSlider').value = 1;
      updateImageTransform();
    };
    modal.style.display = 'flex';
  }

  function getCropDims() {
    return st.cropperMode === 'profile' ? { w: PROFILE, h: PROFILE } : { w: MEDIA_W, h: MEDIA_H };
  }

  function getRendered() {
    var d = getCropDims();
    var bs = Math.max(d.w / st.naturalW, d.h / st.naturalH);
    return {
      w: st.naturalW * bs * st.zoom,
      h: st.naturalH * bs * st.zoom
    };
  }

  function getBounds(z) {
    var d = getCropDims();
    var bs = Math.max(d.w / st.naturalW, d.h / st.naturalH);
    var rW = st.naturalW * bs * z;
    var rH = st.naturalH * bs * z;
    return {
      maxX: Math.max(0, (rW - d.w) / 2),
      maxY: Math.max(0, (rH - d.h) / 2)
    };
  }

  function clampPos(x, y, z) {
    var b = getBounds(z);
    return {
      x: Math.max(-b.maxX, Math.min(b.maxX, x)),
      y: Math.max(-b.maxY, Math.min(b.maxY, y))
    };
  }

  function updateImageTransform() {
    var img = $('al_cropImage');
    var r = getRendered();
    img.style.width = r.w + 'px';
    img.style.height = r.h + 'px';
    img.style.transform = 'translate(calc(-50% + ' + st.posX + 'px), calc(-50% + ' + st.posY + 'px))';
  }

  window.alZoomChange = function(val) {
    st.zoom = parseFloat(val);
    var clamped = clampPos(st.posX, st.posY, st.zoom);
    st.posX = clamped.x; st.posY = clamped.y;
    updateImageTransform();
  };

  // Drag handlers
  var container = null;
  function setupDrag() {
    container = $('al_cropContainer');
    container.addEventListener('mousedown', function(e) {
      st.drag.dragging = true;
      st.drag.startX = e.clientX; st.drag.startY = e.clientY;
      st.drag.startPosX = st.posX; st.drag.startPosY = st.posY;
      container.style.cursor = 'grabbing';
    });
    container.addEventListener('touchstart', function(e) {
      st.drag.dragging = true;
      st.drag.startX = e.touches[0].clientX; st.drag.startY = e.touches[0].clientY;
      st.drag.startPosX = st.posX; st.drag.startPosY = st.posY;
    });
    document.addEventListener('mousemove', function(e) {
      if (!st.drag.dragging) return;
      var dx = e.clientX - st.drag.startX;
      var dy = e.clientY - st.drag.startY;
      var c = clampPos(st.drag.startPosX + dx, st.drag.startPosY + dy, st.zoom);
      st.posX = c.x; st.posY = c.y;
      updateImageTransform();
    });
    document.addEventListener('touchmove', function(e) {
      if (!st.drag.dragging) return;
      e.preventDefault();
      var dx = e.touches[0].clientX - st.drag.startX;
      var dy = e.touches[0].clientY - st.drag.startY;
      var c = clampPos(st.drag.startPosX + dx, st.drag.startPosY + dy, st.zoom);
      st.posX = c.x; st.posY = c.y;
      updateImageTransform();
    }, { passive: false });
    document.addEventListener('mouseup', function() {
      st.drag.dragging = false;
      if (container) container.style.cursor = 'grab';
    });
    document.addEventListener('touchend', function() { st.drag.dragging = false; });
  }
  setTimeout(setupDrag, 0);

  window.alCropCancel = function() {
    $('al_cropperModal').style.display = 'none';
    st.rawProfile = null; st.rawMedia = null; st.cropperMode = null;
  };

  window.alCropConfirm = function() {
    var img = new Image();
    img.onload = function() {
      var d = getCropDims();
      var canvas = document.createElement('canvas');
      var outputW = st.cropperMode === 'profile' ? 400 : 720;
      var outputH = st.cropperMode === 'profile' ? 400 : 1280;
      canvas.width = outputW; canvas.height = outputH;
      var ctx = canvas.getContext('2d');
      var r = getRendered();
      var imgLeft = (d.w / 2 + st.posX) - r.w / 2;
      var imgTop = (d.h / 2 + st.posY) - r.h / 2;
      var sx = (-imgLeft / r.w) * st.naturalW;
      var sy = (-imgTop / r.h) * st.naturalH;
      var sw = (d.w / r.w) * st.naturalW;
      var sh = (d.h / r.h) * st.naturalH;
      ctx.drawImage(img, sx, sy, sw, sh, 0, 0, outputW, outputH);
      var dataUrl = canvas.toDataURL('image/jpeg', 0.9);
      if (st.cropperMode === 'profile') {
        st.photo = dataUrl;
        renderProfilePhoto();
      } else {
        if (st.images.length < 3) st.images.push(dataUrl);
        renderMediaImages();
      }
      $('al_cropperModal').style.display = 'none';
      st.rawProfile = null; st.rawMedia = null; st.cropperMode = null;
      alValidate();
    };
    img.src = st.cropperMode === 'profile' ? st.rawProfile : st.rawMedia;
  };

  function renderProfilePhoto() {
    var circle = $('al_photoCircle');
    var badge = $('al_photoIgBadge');
    if (st.photo) {
      // Instagram gradient ring: 4px colored ring, 4px dark separator, image inside
      // Matches the treatment from instagram_profile_ring_final.html
      circle.innerHTML = '<div style="width:100%;height:100%;border-radius:50%;background:#000;border:2px solid #1c1c1c;box-sizing:border-box;overflow:hidden;display:flex;align-items:center;justify-content:center"><img src="' + st.photo + '" style="width:100%;height:100%;object-fit:cover;display:block"></div>';
      circle.style.border = 'none';
      circle.style.padding = '2px';
      circle.style.background = 'linear-gradient(45deg,#FEDA75 0%,#FA7E1E 25%,#D62976 50%,#962FBF 100%)';
      // Photo uploaded — hide the IG badge, the ring itself signals Instagram
      badge.style.display = 'none';
    } else {
      circle.innerHTML = '<div style="font-size:8px;color:#666;line-height:1.2;font-weight:500">Profile<br/>Image</div>';
      circle.style.border = '1.5px dashed #333';
      circle.style.padding = '0';
      circle.style.background = '#1c1c1c';
      badge.style.display = 'flex';
    }
  }

  // ===== Media =====
  window.alHandleMediaUpload = function(input) {
    var file = input.files[0];
    if (!file) { input.value = ''; return; }
    if (file.type.indexOf('video/') === 0) {
      var reader = new FileReader();
      reader.onload = function(ev) {
        st.video = ev.target.result;
        st.images = [];
        renderMediaVideo();
        renderMediaImages();
        alValidate();
      };
      reader.readAsDataURL(file);
    } else if (file.type.indexOf('image/') === 0) {
      var reader2 = new FileReader();
      reader2.onload = function(ev) {
        st.rawMedia = ev.target.result;
        st.video = null;
        renderMediaVideo();
        st.cropperMode = 'media';
        st.zoom = 1; st.posX = 0; st.posY = 0;
        $('al_zoomSlider').value = 1;
        openCropperModal();
      };
      reader2.readAsDataURL(file);
    }
    input.value = '';
  };

  window.alRemoveVideo = function() {
    st.video = null;
    renderMediaVideo();
    alValidate();
  };

  window.alRemoveImage = function(idx) {
    st.images.splice(idx, 1);
    renderMediaImages();
    alValidate();
  };

  function renderMediaVideo() {
    var box = $('al_mediaVideo');
    var emp = $('al_mediaEmpty');
    if (st.video) {
      box.style.display = 'block';
      emp.style.display = 'none';
      $('al_videoEl').src = st.video;
    } else {
      box.style.display = 'none';
      if (st.images.length === 0) emp.style.display = 'block';
    }
  }

  function renderMediaImages() {
    var box = $('al_mediaImages');
    var emp = $('al_mediaEmpty');
    var counter = $('al_mediaCounter');
    if (st.images.length === 0) {
      box.style.display = 'none';
      counter.style.display = 'none';
      if (!st.video) emp.style.display = 'block';
      return;
    }
    box.style.display = 'flex';
    emp.style.display = 'none';
    counter.style.display = 'block';
    counter.textContent = st.images.length + '/3 images';
    var html = '';
    for (var i = 0; i < st.images.length; i++) {
      html += '<div style="flex:1;aspect-ratio:9/16;position:relative;border-radius:10px;overflow:hidden;background:#1c1c1c;border:1.5px solid #262626">';
      html += '<img src="' + st.images[i] + '" style="width:100%;height:100%;object-fit:cover;display:block">';
      html += '<div onclick="alRemoveImage(' + i + ')" style="position:absolute;top:4px;right:4px;width:22px;height:22px;background:rgba(0,0,0,0.75);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer">';
      html += '<svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>';
      html += '</div></div>';
    }
    if (st.images.length < 3) {
      for (var j = st.images.length; j < 3; j++) {
        html += '<label style="flex:1;aspect-ratio:9/16;display:flex;align-items:center;justify-content:center;background:#1c1c1c;border:1.5px dashed #333;border-radius:12px;cursor:pointer">';
        html += '<svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#666" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>';
        html += '<input type="file" accept="image/*" onchange="alHandleMediaUpload(this)" style="display:none">';
        html += '</label>';
      }
    }
    box.innerHTML = html;
  }

  // ===== Pricing =====
  window.alPriceInput = function(input, days) {
    var v = input.value.replace(/[^0-9]/g, '');
    input.value = v;
    if (days === 30) st.p30 = v;
    if (days === 60) st.p60 = v;
    if (days === 90) st.p90 = v;
    updatePricingUI();
    alValidate();
  };

  window.alPriceFocus = function(days) {
    st.touched['p' + days] = false;
    updatePricingUI();
  };

  window.alPriceBlur = function(days) {
    st.touched['p' + days] = true;
    updatePricingUI();
  };

  function updatePricingUI() {
    var p30 = parseInt(st.p30) || 0;
    var p60 = parseInt(st.p60) || 0;
    var p90 = parseInt(st.p90) || 0;

    // Per-day rates
    $('al_d30').textContent = p30 > 0 ? '$' + (p30 / 30).toFixed(2) + '/day' : '';
    $('al_d60').textContent = p60 > 0 ? '$' + (p60 / 60).toFixed(2) + '/day' : '';
    $('al_d90').textContent = p90 > 0 ? '$' + (p90 / 90).toFixed(2) + '/day' : '';

    // OFF badges
    var perDay30 = p30 > 0 ? p30 / 30 : 0;
    var perDay60 = p60 > 0 ? p60 / 60 : 0;
    var perDay90 = p90 > 0 ? p90 / 90 : 0;

    var off60 = (p30 > 0 && p60 > p30 && perDay60 < perDay30) ? Math.round((perDay30 - perDay60) / perDay30 * 100) : null;
    var off90 = (p30 > 0 && p90 > p60 && perDay90 < perDay30) ? Math.round((perDay30 - perDay90) / perDay30 * 100) : null;

    var off60El = $('al_off60');
    if (off60) { off60El.style.display = 'block'; off60El.textContent = off60 + '% OFF'; }
    else off60El.style.display = 'none';

    var off90El = $('al_off90');
    if (off90) { off90El.style.display = 'block'; off90El.textContent = off90 + '% OFF'; }
    else off90El.style.display = 'none';

    // Errors — minimum price + ordering
    var MIN_PRICE = { USD: 10, EUR: 10, GBP: 10, AED: 50 };
    var userCurr = (window.WLD_USER && window.WLD_USER.currency) || 'USD';
    var userSym = (window.WLD_USER && window.WLD_USER.symbol) || '$';
    var minP = MIN_PRICE[userCurr] || 10;

    var min30 = st.touched.p30 && p30 > 0 && p30 < minP;
    var min60 = st.touched.p60 && p60 > 0 && p60 < minP;
    var min90 = st.touched.p90 && p90 > 0 && p90 < minP;
    var err30 = st.touched.p30 && st.p30 === '0';
    var err60 = st.touched.p60 && (st.p60 === '0' || (p60 > 0 && p30 > 0 && p60 <= p30));
    var err90 = st.touched.p90 && (st.p90 === '0' || (p90 > 0 && p60 > 0 && p90 <= p60));

    var box30Bad = err30 || min30;
    var box60Bad = err60 || min60;
    var box90Bad = err90 || min90;

    $('al_box30').style.border = box30Bad ? '1.5px solid #e91e8c' : '1.5px solid #262626';
    $('al_box60').style.border = box60Bad ? '1.5px solid #e91e8c' : '1.5px solid #262626';
    $('al_box90').style.border = box90Bad ? '1.5px solid #e91e8c' : '1.5px solid #262626';

    var msg = '';
    if (min30 || min60 || min90) msg = 'Minimum ' + userSym + minP;
    else if (err30) msg = 'Price must be greater than 0';
    else if (err60 && st.p60 === '0') msg = 'Price must be greater than 0';
    else if (err90 && st.p90 === '0') msg = 'Price must be greater than 0';
    else if (err60) msg = '60-day price must be higher than 30-day';
    else if (err90) msg = '90-day price must be higher than 60-day';

    var errEl = $('al_priceError');
    if (msg) { errEl.style.display = 'block'; errEl.textContent = msg; }
    else errEl.style.display = 'none';
  }

  // ===== Free trial =====
  window.alToggleTrial = function() {
    st.freeTrial = !st.freeTrial;
    var t = $('al_trialToggle');
    var k = $('al_trialKnob');
    var ps = $('al_pricingSection');
    var row = $('al_trialRow');
    if (st.freeTrial) {
      // Toggle knob + color
      t.style.background = '#e91e8c';
      k.style.left = '22px';
      // Pink border on the trial row itself
      row.style.borderColor = '#e91e8c';
      // Collapse pricing section smoothly
      ps.style.maxHeight = '0';
      ps.style.opacity = '0';
      ps.style.marginBottom = '0';
    } else {
      t.style.background = '#262626';
      k.style.left = '2px';
      row.style.borderColor = '#262626';
      // Expand pricing section smoothly
      ps.style.maxHeight = '500px';
      ps.style.opacity = '1';
      ps.style.marginBottom = '22px';
    }
    alValidate();
  };

  // ===== Validation & Submit =====
  window.alValidate = function() {
    var name = $('al_name').value.trim();
    var city = $('al_city').value.trim();
    var country = $('al_country').value.trim();
    var ig = $('al_instagram').value.trim();
    var hasCat = st.showCustom ? $('al_customCat').value.trim().length > 0 : st.category.length > 0 && st.category !== 'Customize';
    var hasMedia = st.video || st.images.length > 0;
    var hasPhoto = !!st.photo;

    var p30 = parseInt(st.p30) || 0;
    var p60 = parseInt(st.p60) || 0;
    var p90 = parseInt(st.p90) || 0;
    var pricingValid = st.freeTrial || (p30 > 0 && p60 > p30 && p90 > p60);

    var valid = name && city && country && ig && hasCat && hasMedia && hasPhoto && pricingValid;
    var btn = $('al_createBtn');
    if (valid) {
      btn.style.background = '#e91e8c';
      btn.style.border = 'none';
      btn.style.color = '#fff';
      btn.style.cursor = 'pointer';
    } else {
      btn.style.background = '#1c1c1c';
      btn.style.border = '1.5px solid #262626';
      btn.style.color = '#555';
      btn.style.cursor = 'default';
    }
  };

  window.alCreate = function() {
    var btn = $('al_createBtn');
    if (btn.style.cursor !== 'pointer') return;
    var msg = st.freeTrial ? 'Trial listing created → redirecting to Listings page' : 'Listing created → redirecting to Share Payment Link';
    btn.textContent = '✓ ' + msg;
    btn.style.background = '#4ade80';
    btn.style.color = '#000';
    setTimeout(function() {
      btn.textContent = 'Create listing';
      btn.style.background = '#e91e8c';
      btn.style.color = '#fff';
    }, 2500);
  };

})();
</script>
