<style>
  .demo-frame { background: #000; padding: 18px 14px; border-radius: 24px; max-width: 420px; margin: 0 auto; }
  .row { display: flex; align-items: center; gap: 12px; padding: 14px 0; border-bottom: 0.5px solid #1f1f1f; }
  .row:last-child { border-bottom: none; }
  .av-wrap { position: relative; flex-shrink: 0; }
  .avatar { width: 60px; height: 60px; border-radius: 50%; background: linear-gradient(135deg, #f4c0d1, #d4537e); border: 2px solid #d4537e; display: flex; align-items: center; justify-content: center; color: #fff; font-size: 11px; font-weight: 500; }
  .badge { position: absolute; right: -2px; bottom: -2px; width: 28px; height: 28px; border-radius: 50%; background: #25D366; border: 2.5px solid #000; display: flex; align-items: center; justify-content: center; padding: 0; }
  .badge svg { width: 16px; height: 16px; stroke: #fff; stroke-width: 1.8; fill: none; stroke-linecap: round; stroke-linejoin: round; }
  .badge-pulse::before { content: ''; position: absolute; inset: -3px; border-radius: 50%; background: #ED93B1; opacity: 0.15; animation: pulse 2.4s ease-out infinite; z-index: -1; }
  @keyframes pulse { 0% { transform: scale(0.85); opacity: 0.6; } 70%, 100% { transform: scale(1.4); opacity: 0; } }
  .body { flex: 1; min-width: 0; }
  .cat { font-size: 11px; color: #ED93B1; font-weight: 500; letter-spacing: 0.04em; margin: 0 0 2px 0; }
  .name { font-size: 14px; color: #fff; font-weight: 500; margin: 0 0 1px 0; line-height: 1.3; }
  .city { font-size: 11px; color: #888; margin: 0 0 4px 0; }
  .trust { font-size: 11px; color: #fff; }
  .trust-sep { color: #555; margin: 0 5px; }
  .msg-block { display: inline-flex; align-items: center; gap: 4px; }
  .bubble-icon { width: 11px; height: 11px; flex-shrink: 0; }
  .orb { width: 44px; height: 44px; border-radius: 50%; background: linear-gradient(135deg, #f4c0d1, #c25a82); flex-shrink: 0; position: relative; }
  .orb::after { content: ''; position: absolute; right: 4px; bottom: 4px; width: 0; height: 0; border-left: 6px solid #fff; border-top: 4px solid transparent; border-bottom: 4px solid transparent; }
</style>
