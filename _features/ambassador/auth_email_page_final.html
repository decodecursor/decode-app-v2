<div style="display:flex;justify-content:center;padding:1.5rem 0;background:var(--color-background-secondary);border-radius:var(--border-radius-lg)">
<style>#emailRoot input::placeholder { color: #555; opacity: 1; }</style>
<div id="emailRoot" style="width:375px;background:#000;border-radius:24px;overflow:hidden;font-family:system-ui,-apple-system,sans-serif;color:#fff;border:2px solid #1a1a1a;position:relative;min-height:760px">

<!-- ================================================= -->
<!-- EMAIL AUTH SCREEN                                  -->
<!-- ================================================= -->
<div id="emailScreen">

<div style="padding:80px 40px 24px;text-align:center">

<div style="font-size:10px;letter-spacing:3px;color:#888;font-weight:700;margin-bottom:10px">SHOW YOUR BEAUTY SQUAD</div>
<div style="font-size:32px;font-weight:800;letter-spacing:-0.8px;margin-bottom:48px">WeLoveDecode</div>
<div style="width:40px;height:1.5px;background:#e91e8c;margin:0 auto 48px;transform-origin:center;animation:drawLine 1s ease-out forwards"></div><style>@keyframes drawLine{from{transform:scaleX(0)}to{transform:scaleX(1)}}</style>

<input id="emailInput" type="email" placeholder="Email" autocomplete="email" style="width:100%;background:transparent;border:1.5px solid #2a2a2a;border-radius:12px;padding:0 16px;font-size:15px;color:#fff;outline:none;font-family:inherit;height:52px;box-sizing:border-box;margin-bottom:12px;transition:border-color 0.2s" oninput="handleEmailInput(this)" onfocus="this.style.borderColor='#e91e8c'" onblur="this.style.borderColor='#2a2a2a'" />

<div id="emBtn" onclick="continueEmail()" style="border:1.5px solid #2a2a2a;border-radius:12px;padding:16px;font-size:14px;font-weight:600;cursor:pointer;text-align:center;transition:all 0.3s;background:transparent"><span id="emLabel" style="color:#555;transition:color 0.3s">Continue with Email</span></div>

</div>

<div style="position:absolute;bottom:54px;left:0;right:0;text-align:center;font-size:12px;color:#888">
<a href="#use-whatsapp" onclick="useWhatsApp(event)" style="text-decoration:none;color:#888"><span style="color:#e91e8c;font-weight:600">← Use WhatsApp</span> instead</a>
</div>

<div style="position:absolute;bottom:20px;left:0;right:0;text-align:center;font-size:9px;color:#555;line-height:1.6;padding:0 40px">By continuing, you agree to our <a href="https://welovedecode.com/#terms" target="_blank" style="cursor:pointer;font-weight:700;color:#555;text-decoration:none">Terms</a> and <a href="https://welovedecode.com/#privacy" target="_blank" style="cursor:pointer;font-weight:700;color:#555;text-decoration:none">Privacy Policy</a></div>

</div>

<div id="toast" style="position:absolute;left:50%;bottom:60px;transform:translateX(-50%);background:rgba(28,28,28,0.95);border:1px solid #333;color:#fff;padding:10px 18px;border-radius:24px;font-size:12px;opacity:0;transition:opacity 0.2s;pointer-events:none;z-index:20;white-space:nowrap"></div>

</div>
</div>

<script>
(function(){

function showToast(msg, success){
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.color = '#fff';
  t.style.borderColor = success ? '#e91e8c' : '#333';
  t.style.opacity = '1';
  clearTimeout(t._timer);
  t._timer = setTimeout(function(){ t.style.opacity = '0'; }, 1800);
}

// Email validation: contains @, at least one char before and after @,
// and has at least one dot after @ (e.g. name@host.tld)
function isValidEmail(email){
  const e = email.trim();
  if(e.length < 5) return false;
  const at = e.indexOf('@');
  if(at < 1) return false;
  const dot = e.lastIndexOf('.');
  if(dot < at + 2) return false;
  if(dot === e.length - 1) return false;
  return true;
}

window.handleEmailInput = function(el){
  const btn = document.getElementById('emBtn');
  const label = document.getElementById('emLabel');
  // Match auth page pattern: activate button as soon as input contains '@'.
  // Full validation happens on submit via isValidEmail.
  if(el.value.length > 0 && el.value.includes('@')){
    btn.style.borderColor = '#e91e8c';
    btn.style.background = '#e91e8c';
    label.style.color = '#fff';
  } else {
    btn.style.borderColor = '#2a2a2a';
    btn.style.background = 'transparent';
    label.style.color = '#555';
  }
};

window.continueEmail = function(){
  const btn = document.getElementById('emBtn');
  // Only fire when active (pink background means ready)
  if(btn.style.background !== 'rgb(233, 30, 140)' && btn.style.background !== '#e91e8c'){
    showToast('Enter a valid email');
    return;
  }
  const email = document.getElementById('emailInput').value.trim();
  if(!isValidEmail(email)){
    showToast('Enter a valid email');
    return;
  }
  showToast('Sending magic link to ' + email, true);
  // Production: route to /model/auth/sent after Supabase magic-link send.
};

window.useWhatsApp = function(ev){
  if(ev) ev.preventDefault();
  showToast('Returning to WhatsApp sign-in', true);
  // Production: router.push('/model/auth') or window.location.href = '/model/auth'.
};

})();
</script>
